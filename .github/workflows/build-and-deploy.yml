name: Build and Deploy Vue.JS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.11"

      - run: corepack enable
#      - run: npm i -g pnpm

      - name: Setup pages
        uses: actions/configure-pages@v5

      - name: Build Vue
        run: pnpm i
        
      - run: pnpm build

      - name: fix file permissions
        run: chmod -R a+rx ./dist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          path: ./dist
          name: github-pages
  
  deploy:
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy Page
        id: deployment
        uses: actions/deploy-pages@v4
